<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Boludle Diario</title>

<style>
body {
background:#121213;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.topbar {
display:flex;
justify-content:space-between;
padding:10px;
}

button {
background:none;
border:none;
color:white;
cursor:pointer;
}

.grid {
display:grid;
gap:5px;
width:85vw;
max-width:320px;
margin:40px auto;
}

.row {
display:grid;
grid-template-columns:repeat(5,1fr);
gap:5px;
}

.tile {
border:2px solid #3a3a3c;
aspect-ratio:1;
display:flex;
align-items:center;
justify-content:center;
font-size:clamp(22px,5vw,32px);
cursor:pointer;
}

.tile.active {
border:2px solid white;
}

.correct{background:#538d4e;}
.present{background:#b59f3b;}
.absent{background:#3a3a3c;}

#keyboard { max-width:480px; margin:auto; }

.keyrow {
display:flex;
gap:5px;
margin-bottom:6px;
}

.key {
flex:1;
padding:12px 0;
background:#818384;
border-radius:5px;
user-select:none;
text-align:center;
}

.bigkey { flex:1.5; }

.key.absent { background:#3a3a3c; }

#endBox,#rankingBox{display:none;padding:20px;}
</style>
</head>

<body>

<div class="topbar">
<button onclick="openRanking()">🏆</button>
<span id="nameButton"></span>
<button onclick="window.open('https://cafecito.app/')">☕</button>
</div>

<h1>BOLUDLE 🇦🇷</h1>

<div id="game">
<div id="grid" class="grid"></div>
<div id="keyboard"></div>
</div>

<div id="endBox"></div>
<div id="rankingBox"></div>

<script src="diccionario.js"></script>

<script>

// 👤 nombre único + reset
function getUniqueName(){
let ranking=JSON.parse(localStorage.getItem("ranking"))||[];
let name;
while(true){
name=prompt("Nombre:");
if(!name) name="Jugador";
if(!ranking.some(p=>p.name.toLowerCase()===name.toLowerCase())) break;
alert("Nombre en uso");
}
return name;
}

let playerName=localStorage.getItem("player");
let nameDate=localStorage.getItem("nameDate");
const now=Date.now();
const fiveDays=5*86400000;

if(!playerName){
playerName=getUniqueName();
localStorage.setItem("player",playerName);
localStorage.setItem("nameDate",now);
}

function updateNameButton(){
const el=document.getElementById("nameButton");

if(now - nameDate > fiveDays){
el.innerHTML=`<button onclick="changeName()">🔁 Nombre</button>`;
}else{
el.innerHTML=`👤 ${playerName}`;
}
}
updateNameButton();

function changeName(){
const newName=getUniqueName();
localStorage.setItem("player",newName);
localStorage.setItem("nameDate",Date.now());
location.reload();
}

// 🕛 día
function getDay(){
const start=new Date(2024,0,1);
const t=new Date();
const d=new Date(t.getFullYear(),t.getMonth(),t.getDate());
return Math.floor((d-start)/86400000);
}
const day=getDay();

// palabras
const answers=["AMIGO","PERRO","GATOS","CASAS","ARBOL","PLATA","CURRO","TRUCO","CHETO","PIOLA"];
const word=answers[day%answers.length];

// guardado
let save=JSON.parse(localStorage.getItem("game"))||{
date:day,guesses:[],finished:false,keys:{}
};

if(save.date!==day){
save={date:day,guesses:[],finished:false,keys:{}};
}

// GRID
const grid=document.getElementById("grid");

for(let i=0;i<6;i++){
let row=document.createElement("div");
row.className="row";

for(let j=0;j<5;j++){
let t=document.createElement("div");
t.className="tile";

t.onclick=()=>{
currentRow=i;
currentTile=j;
updateActive();
};

row.appendChild(t);
}
grid.appendChild(row);
}

let currentRow=save.guesses.length;
let currentTile=0;
let guess="";

// activo
function updateActive(){
document.querySelectorAll(".tile").forEach(t=>t.classList.remove("active"));
grid.children[currentRow].children[currentTile].classList.add("active");
}
updateActive();

// teclado
const keyboard=document.getElementById("keyboard");
const keyMap={};

const layout=[
["Q","W","E","R","T","Y","U","I","O","P"],
["A","S","D","F","G","H","J","K","L","Ñ"],
["ENTER","Z","X","C","V","B","N","M","⌫"]
];

layout.forEach(r=>{
let row=document.createElement("div");
row.className="keyrow";

r.forEach(k=>{
let key=document.createElement("div");
key.textContent=k;

if(k==="ENTER"||k==="⌫"){
key.className="key bigkey";
}else{
key.className="key";
keyMap[k]=key;
}

key.onclick=()=>{
if(k==="ENTER") submit();
else if(k==="⌫") del();
else type(k);
};

row.appendChild(key);
});

keyboard.appendChild(row);
});

// restaurar teclado
Object.keys(save.keys).forEach(k=>{
keyMap[k]?.classList.add(save.keys[k]);
});

// escribir
function type(l){
if(save.finished) return;

const row=grid.children[currentRow];

row.children[currentTile].textContent=l;

// reconstruir
guess="";
for(let i=0;i<5;i++){
guess+=row.children[i].textContent||"";
}

if(currentTile<4) currentTile++;
updateActive();
}

// borrar
function del(){
if(save.finished) return;

const row=grid.children[currentRow];

if(!row.children[currentTile].textContent && currentTile>0){
currentTile--;
}

row.children[currentTile].textContent="";

guess="";
for(let i=0;i<5;i++){
guess+=row.children[i].textContent||"";
}

updateActive();
}

// teclado físico
document.addEventListener("keydown",e=>{
if(e.key==="Enter") submit();
else if(e.key==="Backspace") del();
else if(/^[a-zñ]$/i.test(e.key)) type(e.key.toUpperCase());
});

// submit
function submit(){
if(guess.length!==5) return;
if(!dictionary.includes(guess)) return alert("No existe");

save.guesses.push(guess);

for(let i=0;i<5;i++){
let l=guess[i];
let tile=grid.children[currentRow].children[i];

if(word[i]===l) tile.classList.add("correct");
else if(word.includes(l)) tile.classList.add("present");
else{
tile.classList.add("absent");
keyMap[l]?.classList.add("absent");
save.keys[l]="absent";
}
}

localStorage.setItem("game",JSON.stringify(save));

if(guess===word) return end(true);

currentRow++;
currentTile=0;
guess="";

if(currentRow===6) end(false);
updateActive();
}

// ranking
function saveScore(){
let r=JSON.parse(localStorage.getItem("ranking"))||[];
let p=r.find(x=>x.name===playerName);
if(p) p.score++;
else r.push({name:playerName,score:1});
r.sort((a,b)=>b.score-a.score);
localStorage.setItem("ranking",JSON.stringify(r));
}

function openRanking(){
document.getElementById("game").style.display="none";
let r=JSON.parse(localStorage.getItem("ranking"))||[];

let html="<h2>🏆 Ranking</h2>";
r.slice(0,10).forEach((p,i)=>{
html+=`${i+1}. ${p.name} - ${p.score}<br>`;
});

html+="<br><button onclick='location.reload()'>Volver</button>";

document.getElementById("rankingBox").style.display="block";
document.getElementById("rankingBox").innerHTML=html;
}

// fin
function end(win){
save.finished=true;
localStorage.setItem("game",JSON.stringify(save));

if(win) saveScore();

document.getElementById("game").style.display="none";
document.getElementById("endBox").style.display="block";
document.getElementById("endBox").innerHTML=
(win?"Ganaste 😎":"Perdiste 😭")+"<br>"+word;
}

</script>

</body>
</html>
