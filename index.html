<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Boludle Diario</title>

<style>
body {
background:#121213;
color:white;
font-family:Arial;
text-align:center;
margin:0;
touch-action: manipulation;
}

.topbar {
display:flex;
justify-content:space-between;
padding:10px;
}

/* GRID */
.grid {
display:grid;
grid-template-rows:repeat(6,1fr);
gap:5px;
width:90vw;
max-width:350px;
margin:20px auto;
}

.row {
display:grid;
grid-template-columns:repeat(5,1fr);
gap:5px;
}

.tile {
border:2px solid #3a3a3c;
aspect-ratio:1/1;
font-size:clamp(22px, 5vw, 32px);
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
}

/* ANIMACION */
.flip { animation:flip .6s ease; }

@keyframes flip {
0%{transform:rotateX(0)}
50%{transform:rotateX(90deg)}
100%{transform:rotateX(0)}
}

.correct{background:#538d4e;}
.present{background:#b59f3b;}
.absent{background:#3a3a3c;}

/* TECLADO */
#keyboard {
max-width:500px;
margin:10px auto;
}

.keyrow {
display:flex;
justify-content:center;
gap:5px;
margin-bottom:6px;
}

.key {
flex:1;
min-width:0;
padding:14px 0;
background:#818384;
border-radius:5px;
cursor:pointer;
font-size:clamp(14px, 3.5vw, 18px);
text-align:center;

user-select:none;
-webkit-user-select:none;
touch-action:manipulation;
}

.bigkey {
flex:1.5;
font-size:12px;
background:#565758;
}

.key:active {
transform:scale(0.95);
}

/* BOXES */
#endBox{display:none;background:#222;padding:20px;margin-top:20px;}
#rankingBox{display:none;padding:20px;}
</style>
</head>

<body>

<div class="topbar">
<button onclick="openRanking()">🏆 Ranking</button>
<button onclick="window.open('https://cafecito.app/', '_blank')">☕ Cafecito</button>
</div>

<h1>BOLUDLE 🇦🇷</h1>

<div id="game">
<div class="grid" id="grid"></div>
<div id="keyboard"></div>
</div>

<div id="endBox"></div>
<div id="rankingBox"></div>

<script src="diccionario.js"></script>

<script>

// evitar zoom hardcore
document.addEventListener('gesturestart', e => e.preventDefault());

// 📅 día
const startDate = new Date("2024-01-01");
const todayDate = new Date();
const dayNumber = Math.floor((todayDate - startDate)/(1000*60*60*24));

// palabras
const answers = ["AMIGO","PERRO","GATOS","CASAS","ARBOL","PLATA","CURRO","TRUCO","CHETO","PIOLA"];

function getDailyWord() {
return answers[dayNumber % answers.length];
}

const today = todayDate.toDateString();
const word = getDailyWord();

// guardado
let save = JSON.parse(localStorage.getItem("boludleGame")) || {
date: today,
guesses: [],
finished: false
};

if (save.date !== today) {
save = { date: today, guesses: [], finished: false };
}

// stats
let stats = JSON.parse(localStorage.getItem("boludleStats")) || {
wins:0, played:0, streak:0
};

// GRID
const grid = document.getElementById("grid");

for (let i = 0; i < 6; i++) {
const row = document.createElement("div");
row.className = "row";

for (let j = 0; j < 5; j++) {
const tile = document.createElement("div");
tile.className = "tile";
row.appendChild(tile);
}

grid.appendChild(row);
}

// TECLADO PERFECTO
const keyboard = document.getElementById("keyboard");

const layout = [
["Q","W","E","R","T","Y","U","I","O","P"],
["A","S","D","F","G","H","J","K","L","Ñ"],
["ENTER","Z","X","C","V","B","N","M","⌫"]
];

layout.forEach(row=>{
const div=document.createElement("div");
div.className="keyrow";

row.forEach(key=>{
const k=document.createElement("div");
k.textContent=key;

if(key==="ENTER" || key==="⌫"){
k.className="key bigkey";
} else {
k.className="key";
}

k.onclick=()=>{
if(key==="ENTER") submitGuess();
else if(key==="⌫") deleteLetter();
else handleKey(key);
};

div.appendChild(k);
});

keyboard.appendChild(div);
});

let currentRow = save.guesses.length;
let currentTile = 0;
let guess = "";

// restaurar
save.guesses.forEach((g, rowIndex) => {
const row = grid.children[rowIndex];

for (let i = 0; i < 5; i++) {
row.children[i].textContent = g[i];

if (word[i] === g[i]) row.children[i].classList.add("correct");
else if (word.includes(g[i])) row.children[i].classList.add("present");
else row.children[i].classList.add("absent");
}
});

// INPUT
function handleKey(letter) {
if (save.finished) return;

if (currentTile < 5) {
const tile = grid.children[currentRow].children[currentTile];
tile.textContent = letter;
guess += letter;
currentTile++;
}
}

document.addEventListener("keydown", e=>{
if (e.key==="Enter") submitGuess();
else if (e.key==="Backspace") deleteLetter();
else if (/^[a-zñ]$/i.test(e.key)) handleKey(e.key.toUpperCase());
});

function deleteLetter() {
if (currentTile>0){
currentTile--;
guess=guess.slice(0,-1);
grid.children[currentRow].children[currentTile].textContent="";
}
}

// intento con animación
function submitGuess() {
if (guess.length!==5) return;

if (!dictionary.includes(guess)) {
alert("Esa palabra no existe capo 🤨");
return;
}

save.guesses.push(guess);
localStorage.setItem("boludleGame", JSON.stringify(save));

const row = grid.children[currentRow];

for (let i=0;i<5;i++){
const tile=row.children[i];
const l=guess[i];

setTimeout(()=>{
tile.classList.add("flip");

setTimeout(()=>{
if(word[i]===l) tile.classList.add("correct");
else if(word.includes(l)) tile.classList.add("present");
else tile.classList.add("absent");
},300);

}, i*300);
}

setTimeout(()=>{
if (guess===word) {
stats.wins++; stats.streak++;
endGame(true);
return;
}

currentRow++;
currentTile=0;
guess="";

if (currentRow===6) endGame(false);

},1800);
}

// compartir
function shareResult(){
let text = `Boludle #${dayNumber}\n`;

save.guesses.forEach(g=>{
for(let i=0;i<5;i++){
if(word[i]===g[i]) text+="🟩";
else if(word.includes(g[i])) text+="🟨";
else text+="⬛";
}
text+="\n";
});

if(navigator.share){
navigator.share({text});
}else{
navigator.clipboard.writeText(text);
alert("Resultado copiado 😎");
}
}

// ranking
function saveScore(){
let name = prompt("Tu nombre:");
if(!name) return;

let ranking = JSON.parse(localStorage.getItem("ranking")) || [];

ranking.push({name, score:stats.wins});
ranking.sort((a,b)=>b.score-a.score);

localStorage.setItem("ranking", JSON.stringify(ranking));
}

function openRanking(){
document.getElementById("game").style.display="none";
const box=document.getElementById("rankingBox");
box.style.display="block";

let ranking = JSON.parse(localStorage.getItem("ranking")) || [];

let html="<h2>🏆 Ranking</h2>";
ranking.slice(0,10).forEach((p,i)=>{
html+=`${i+1}. ${p.name} - ${p.score}<br>`;
});

html+="<br><button onclick='location.reload()'>Volver</button>";

box.innerHTML=html;
}

// fin
function endGame(win){
save.finished=true;
localStorage.setItem("boludleGame", JSON.stringify(save));

stats.played++;
if(!win) stats.streak=0;

localStorage.setItem("boludleStats", JSON.stringify(stats));

if(win) saveScore();

showEnd(
(win?"Ganaste 😎":"Perdiste 😭")+
"<br>Era: "+word+
`<br><br><button onclick="shareResult()">Compartir</button>`+
"<br><br>Volvé mañana 👀"
);
}

function showEnd(text){
document.getElementById("game").style.display="none";
const box=document.getElementById("endBox");
box.style.display="block";
box.innerHTML=text;
}

if (save.finished) {
showEnd("Ya jugaste hoy 😎<br>Volvé mañana");
}

</script>

</body>
</html>
